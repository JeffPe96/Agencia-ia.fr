<!doctype html>
<html
  lang="fr"
  class="dark"
  data-theme="dark"
  style="color-scheme: dark only; scroll-padding-top: 180px; scroll-behavior: smooth; background-color: #0a0e17"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark only" />
    <meta name="supported-color-schemes" content="dark" />
    <meta name="theme-color" content="#0a0e17" />

    <title>AgencIA — Agents IA & Sites Web haute performance pour commerces locaux</title>
    <meta
      name="description"
      content="AgencIA conçoit des assistants vocaux IA, sites web haute performance et agents conversationnels sur-mesure pour les commerces locaux. Démo gratuite."
    />
    <meta name="keywords" content="agence IA, assistant vocal IA, agent IA, chatbot, site web, Annecy, automatisation, commerces locaux" />
    <meta name="author" content="AgencIA" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://agencia.fr/" />

    <!-- Performance: preconnect & preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="/src/assets/hero-immersive.jpg" fetchpriority="high" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="AgencIA — Agents IA & Sites Web haute performance" />
    <meta
      property="og:description"
      content="Assistants vocaux IA, sites web haute performance et agents conversationnels sur-mesure pour les commerces locaux."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agencia.fr/" />
    <meta property="og:site_name" content="AgencIA" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AgencIA — Solutions IA pour entreprises" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AgencIA — Agents IA & Sites Web haute performance" />
    <meta
      name="twitter:description"
      content="Assistants vocaux IA, sites web haute performance et agents conversationnels sur-mesure."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Structured data: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://agencia.fr/#organization",
            "name": "AgencIA",
            "url": "https://agencia.fr/",
            "logo": "https://agencia.fr/favicon.png",
            "email": "contact@agencia-ia.fr",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Annecy",
              "addressCountry": "FR"
            },
            "areaServed": "FR",
            "description": "Agence spécialisée dans les assistants vocaux IA, sites web haute performance et agents conversationnels pour les commerces locaux."
          },
          {
            "@type": "WebSite",
            "@id": "https://agencia.fr/#website",
            "url": "https://agencia.fr/",
            "name": "AgencIA",
            "inLanguage": "fr-FR",
            "publisher": { "@id": "https://agencia.fr/#organization" }
          }
        ]
      }
    </script>
  </head>

  <body>
    <a href="#main" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[10000] focus:bg-primary focus:text-primary-foreground focus:px-4 focus:py-2 focus:rounded-md">Aller au contenu</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
